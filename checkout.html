<!DOCTYPE html>
<html>
<head>
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <h1>💳 Checkout</h1>

  <div>
    <a href="index.html">Home</a>
    <a href="cart.html">Cart</a>
  </div>
</div>

<div style="padding:20px; max-width:500px; margin:auto;">

  <h2>Enter Your Details</h2>

  <input id="name" placeholder="Your Name" style="width:100%; padding:10px; margin:10px 0;">
  
  <input id="address" placeholder="Your Address" style="width:100%; padding:10px; margin:10px 0;">

  <button onclick="placeOrder()" style="width:100%; padding:10px;">
    Confirm Order
  </button>

  <h3 id="message" style="text-align:center; margin-top:20px;"></h3>

</div>

<script>

function placeOrder() {

  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  if (cart.length === 0) {
    document.getElementById("message").innerText = "Cart is empty 🚗";
    return;
  }

  if (name === "" || address === "") {
    document.getElementById("message").innerText = "Please fill all fields!";
    return;
  }

  // Fake order success
  document.getElementById("message").innerText =
    "Order placed successfully 🎉";

  // Clear cart after order
  localStorage.removeItem("cart");

}

</script>

</body>
</html>
